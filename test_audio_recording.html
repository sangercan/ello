<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Gravação de Áudio - Ello</title>
    <style>
        body {
            font-family: System, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
        }
        .container {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #334155;
        }
        h1 { color: #60a5fa; margin-top: 0; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover { background: #2563eb; }
        button:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 4px;
            background: #0f172a;
            border-left: 4px solid #3b82f6;
        }
        .success { border-left-color: #10b981; color: #d1fae5; }
        .error { border-left-color: #ef4444; color: #fee2e2; }
        .info { border-left-color: #3b82f6; color: #dbeafe; }
        #logs {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
            color: #a1a5b0;
            margin-top: 20px;
        }
        .log-line {
            margin: 2px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Teste de Gravação de Áudio</h1>
        
        <div id="status" class="status info">Pronto para teste</div>
        
        <div>
            <button id="startBtn" onclick="startRecording()">▶️ Iniciar Gravação</button>
            <button id="stopBtn" onclick="stopRecording()" disabled>⏹️ Parar Gravação</button>
            <button id="uploadBtn" onclick="uploadAudio()" disabled>📤 Enviar Áudio</button>
            <button id="clearBtn" onclick="clearLogs()">🗑️ Limpar Logs</button>
        </div>
        
        <div id="logs"></div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        let audioBlob = null;
        let stream = null;

        function log(msg, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const line = document.createElement('div');
            line.className = 'log-line';
            
            let prefix = '';
            if (type === 'success') prefix = '✅ ';
            else if (type === 'error') prefix = '❌ ';
            else if (type === 'info') prefix = 'ℹ️ ';
            else if (type === 'warning') prefix = '⚠️ ';
            
            line.textContent = prefix + msg;
            logsDiv.appendChild(line);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }

        function updateStatus(msg, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status ${type}`;
        }

        async function startRecording() {
            try {
                log('Solicitando acesso ao microfone...', 'info');
                stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                    }
                });
                log('✅ Acesso ao microfone concedido', 'success');

                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                        log(`Chunk: ${event.data.size} bytes`);
                    }
                };

                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    log(`Gravação concluída: ${audioBlob.size} bytes`, 'success');
                    document.getElementById('uploadBtn').disabled = false;
                };

                mediaRecorder.start(100);
                updateStatus('🎤 Gravando... Fale agora!', 'success');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                log('Gravação iniciada', 'success');
            } catch (error) {
                updateStatus(`Erro ao acessar microfone: ${error.message}`, 'error');
                log(error.message, 'error');
            }
        }

        function stopRecording() {
            if (mediaRecorder) {
                mediaRecorder.stop();
                stream.getTracks().forEach(track => track.stop());
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('startBtn').disabled = false;
                log('Gravação parada', 'info');
            }
        }

        async function uploadAudio() {
            if (!audioBlob) {
                updateStatus('Nenhum áudio gravado', 'error');
                return;
            }

            try {
                log('Convertendo áudio para base64...', 'info');
                const reader = new FileReader();
                
                reader.onloadend = async () => {
                    const base64Audio = reader.result;
                    log(`Base64 size: ${base64Audio.length} chars`);

                    try {
                        // Step 1: Get token
                        log('Obtendo token de autenticação...', 'info');
                        const authRes = await fetch('http://localhost:8000/auth/dev-login', {
                            method: 'POST'
                        });
                        const authData = await authRes.json();
                        const token = authData.access_token;
                        log('✅ Token obtido', 'success');

                        // Step 2: Send audio
                        log('Enviando áudio para /chat/audio...', 'info');
                        const audioRes = await fetch('http://localhost:8000/chat/audio', {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                audio_blob: base64Audio,
                                receiver_id: 2,
                                duration: parseInt(base64Audio.length / 1000)
                            })
                        });

                        const audioData = await audioRes.json();
                        
                        if (audioRes.ok) {
                            log(`✅ Upload bem-sucedido! Message ID: ${audioData.message.id}`, 'success');
                            log(`Audio URL: ${audioData.url}`, 'info');
                            updateStatus('✅ Áudio enviado com sucesso!', 'success');
                        } else {
                            log(`❌ Erro: ${audioData.error}`, 'error');
                            updateStatus('Erro ao enviar áudio', 'error');
                        }
                    } catch (error) {
                        log(`Erro na requisição: ${error.message}`, 'error');
                        updateStatus('Erro na requisição', 'error');
                    }
                };

                reader.readAsDataURL(audioBlob);
            } catch (error) {
                updateStatus('Erro ao processar áudio', 'error');
                log(error.message, 'error');
            }
        }
    </script>
</body>
</html>
