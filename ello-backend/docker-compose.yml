version: "3.9"

services:

  db:
    image: postgres:15
    container_name: ello_db
    restart: always
    environment:
      # Restore original DB user created when the volume was first initialized
      POSTGRES_USER: ello
      POSTGRES_PASSWORD: ello123
      POSTGRES_DB: ello
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ello"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ello_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # db_init removed: using postgres superuser ensures DB is created by the
  # official image on first run. If you have an existing volume with a
  # different DB name, recreate the volume or run a manual CREATE DATABASE.

  backend:
    build: .
    container_name: ello_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://ello:ello123@db:5432/ello
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  postgres_data: